# ============================================================
# INTEGER ENCODING VECTORS (from tests-skeletons/check-INTEGER.c)
# ============================================================

- name: integer_positive_1
  description: "INTEGER 1, single byte positive"
  ber_hex: "020101"
  expected:
    tag_class: universal
    tag_number: 2
    constructed: false
    content: "01"
    decoded_integer: 1

- name: integer_negative_1
  description: "INTEGER -1, single byte negative"
  ber_hex: "0201FF"
  expected:
    tag_class: universal
    tag_number: 2
    constructed: false
    content: "FF"
    decoded_integer: -1

- name: integer_negative_1_padded_non_minimal
  description: "INTEGER -1, large negative with padding (non-minimal)"
  ber_hex: "0207FFFFFFFFFFFFFF"
  expected:
    tag_class: universal
    tag_number: 2
    constructed: false
    content: "FFFFFFFFFFFFFF"
    decoded_integer: -1

- name: integer_negative_16_non_minimal
  description: "INTEGER -16, negative with sign extension (non-minimal)"
  ber_hex: "0204FFFFFFF0"
  expected:
    tag_class: universal
    tag_number: 2
    constructed: false
    content: "FFFFFFF0"
    decoded_integer: -16

- name: integer_large_positive
  description: "INTEGER 2138996092, large positive"
  ber_hex: "02047F7E7D7C"
  expected:
    tag_class: universal
    tag_number: 2
    constructed: false
    content: "7F7E7D7C"
    decoded_integer: 2138996092

- name: integer_int32_min
  description: "INTEGER -2147483648, INT_MIN"
  ber_hex: "020480000000"
  expected:
    tag_class: universal
    tag_number: 2
    constructed: false
    content: "80000000"
    decoded_integer: -2147483648

- name: integer_negative_128
  description: "INTEGER -128, min single-byte negative"
  ber_hex: "020180"
  expected:
    tag_class: universal
    tag_number: 2
    constructed: false
    content: "80"
    decoded_integer: -128

- name: integer_positive_127
  description: "INTEGER 127, max single-byte positive"
  ber_hex: "02017F"
  expected:
    tag_class: universal
    tag_number: 2
    constructed: false
    content: "7F"
    decoded_integer: 127

- name: integer_128_padded
  description: "INTEGER 128, requires padding byte"
  ber_hex: "02020080"
  expected:
    tag_class: universal
    tag_number: 2
    constructed: false
    content: "0080"
    decoded_integer: 128

- name: integer_32768_padded
  description: "INTEGER 32768, requires padding byte"
  ber_hex: "0203008000"
  expected:
    tag_class: universal
    tag_number: 2
    constructed: false
    content: "008000"
    decoded_integer: 32768

- name: integer_zero
  description: "INTEGER 0"
  ber_hex: "020100"
  expected:
    tag_class: universal
    tag_number: 2
    constructed: false
    content: "00"
    decoded_integer: 0

- name: integer_negative_129
  description: "INTEGER -129"
  ber_hex: "0202FF7F"
  expected:
    tag_class: universal
    tag_number: 2
    constructed: false
    content: "FF7F"
    decoded_integer: -129

- name: integer_negative_32768
  description: "INTEGER -32768"
  ber_hex: "02028000"
  expected:
    tag_class: universal
    tag_number: 2
    constructed: false
    content: "8000"
    decoded_integer: -32768

- name: integer_non_minimal_positive
  description: "INTEGER 1 with unnecessary padding (DER would reject)"
  ber_hex: "02020001"
  expected:
    tag_class: universal
    tag_number: 2
    constructed: false
    content: "0001"
    decoded_integer: 1

- name: integer_non_minimal_negative
  description: "INTEGER -1 with unnecessary padding (DER would reject)"
  ber_hex: "0202FFFF"
  expected:
    tag_class: universal
    tag_number: 2
    constructed: false
    content: "FFFF"
    decoded_integer: -1

# ============================================================
# STRUCTURED BER VECTORS (from tests-c-compiler/data-62/)
# Clean files - complete BER structures
# ============================================================

# data-62-01.ber: SEQUENCE + INTEGER(5) + [1]ANY(NumericString "test")
- name: data62_01_sequence_with_any
  description: "SEQUENCE with INTEGER(5) and [1]ANY containing NumericString 'test'"
  ber_hex: "300b020105a106130474657374"
  ber_file: data-62-01.ber
  expected:
    tag_class: universal
    tag_number: 16
    constructed: true
    content_length: 11
    children:
      - tag_class: universal
        tag_number: 2
        constructed: false
        content: "05"
        decoded_integer: 5
      - tag_class: context
        tag_number: 1
        constructed: true
        content: "130474657374"
        children:
          - tag_class: universal
            tag_number: 19
            constructed: false
            content: "74657374"
            decoded_string: "test"

# data-62-10.ber: SEQUENCE + [1]ANY([APPLICATION 3] INTEGER)
