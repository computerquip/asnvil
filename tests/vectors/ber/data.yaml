# BER Test Vectors
# Adapted from vlm/asn1c project (MIT license)
# https://github.com/vlm/asn1c
#
# Format: Each vector has:
#   - name: unique identifier
#   - description: human-readable description
#   - ber_hex: hex string of BER-encoded data
#   - ber_file: optional reference to binary .ber file in data-62/
#   - expected: expected decoded structure
#   - error: optional expected error type (instead of expected)

# ============================================================
# TAG ENCODING VECTORS (from tests-skeletons/check-ber_tlv_tag.c)
# ============================================================

- name: tag_universal_0
  description: "Universal tag 0, minimum universal tag"
  ber_hex: "00"
  expected:
    tag_class: universal
    tag_number: 0
    constructed: false

- name: tag_universal_2_integer
  description: "Universal tag 2 (INTEGER), single-byte tag"
  ber_hex: "02"
  expected:
    tag_class: universal
    tag_number: 2
    constructed: false

- name: tag_universal_16_sequence
  description: "Universal tag 16 (SEQUENCE), constructed"
  ber_hex: "30"
  expected:
    tag_class: universal
    tag_number: 16
    constructed: true

- name: tag_universal_30
  description: "Universal tag 30, high-numbered short form"
  ber_hex: "1E"
