  expected:
    length: 128

- name: length_255_max_2byte
  description: "Length 255, max 2-byte length"
  ber_hex: "81FF"
  expected:
    length: 255

- name: length_256_min_3byte
  description: "Length 256, min 3-byte length"
  ber_hex: "820100"
  expected:
    length: 256

- name: length_65535_max_3byte
  description: "Length 65535, max 3-byte length"
